<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koremobile — Mobiles, Laptops & More</title>
    <meta name="description" content="Best deals on smartphones, laptops, tablets and accessories. Fast delivery across Gujarat." />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:   #f4f6fb;
        --card: #ffffff;
        --s1:   #e8eaf2;
        --s2:   #d4d8e8;
        --sh:   rgba(255,255,255,0.78);
      }

      body { background: var(--bg); overflow-x: hidden; }

      @keyframes sh  { to { transform: translateX(100%); } }
      @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.045)} }
      @keyframes flare { 0%,100%{opacity:.7} 50%{opacity:1} }

      .b {
        border-radius: 7px;
        background: var(--s1);
        position: relative;
        overflow: hidden;
        flex-shrink: 0;
      }
      .b::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, var(--sh) 50%, transparent 100%);
        transform: translateX(-100%);
        animation: sh 1.55s linear infinite;
      }

      /* ── ANNOUNCEMENT BAR ── */
      #sa {
        background: #0f172a;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 0 12px;
        overflow: hidden;
      }

      /* ── HEADER ── */
      #sh {
        background: var(--card);
        border-bottom: 1px solid var(--s1);
        padding: 9px 14px;
        display: grid;
        grid-template-columns: 120px 1fr auto;
        align-items: center;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      #sh-logo {
        height: 28px;
        border-radius: 7px;
        background: linear-gradient(90deg,#c7d2fe,#dbeafe,#c7d2fe);
        background-size: 200% 100%;
        animation: sh 1.55s linear infinite;
        position: relative;
        overflow: hidden;
      }
      #sh-search {
        height: 36px;
        border-radius: 20px;
        background: var(--s1);
        position: relative;
        overflow: hidden;
        min-width: 0;
      }
      #sh-search::after {
        content:"";
        position:absolute;
        inset:0;
        background:linear-gradient(90deg,transparent,var(--sh),transparent);
        transform:translateX(-100%);
        animation:sh 1.55s linear infinite;
      }
      #sh-right { display:flex; gap:8px; align-items:center; }

      /* ── CATEGORY NAV ── */
      #sn {
        background: var(--card);
        border-bottom: 1px solid var(--s1);
        padding: 7px 14px;
        display: flex;
        gap: 7px;
        overflow: hidden;
      }

      /* ── PAGE WRAP ── */
      #sw {
        max-width: 1200px;
        margin: 0 auto;
        padding: 12px 14px 32px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      /* ── TRUST BADGES ── */
      #st {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .tc {
        background: var(--card);
        border: 1px solid var(--s1);
        border-radius: 12px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      /* ── HERO ── */
      #shr {
        border-radius: 16px;
        background: linear-gradient(118deg,#0f172a 0%,#1e3a8a 52%,#2563eb 100%);
        overflow: hidden;
        padding: 22px 20px;
        display: grid;
        grid-template-columns: 1fr 160px;
        align-items: center;
        gap: 16px;
        min-height: 200px;
        position: relative;
      }
      #shr::before {
        content:"";
        position:absolute;
        width:300px;height:300px;
        border-radius:50%;
        background:rgba(255,255,255,0.04);
        top:-100px;right:40px;
        pointer-events:none;
        animation:flare 5s ease-in-out infinite;
      }
      #shr .b { background:rgba(255,255,255,0.17); }
      #shr .b::after { background:linear-gradient(90deg,transparent,rgba(255,255,255,0.32),transparent); }
      #shr-img {
        width:150px;height:150px;
        border-radius:16px;
        background:rgba(255,255,255,0.11);
        border:1px solid rgba(255,255,255,0.18);
        margin:0 auto;
        position:relative;overflow:hidden;
      }
      #shr-img::after {
        content:"";
        position:absolute;inset:0;
        background:linear-gradient(135deg,rgba(255,255,255,0.06) 0%,rgba(255,255,255,0.15) 50%,rgba(255,255,255,0.06) 100%);
        animation:flare 4s ease-in-out infinite;
      }
      .hcta  { height:32px;width:120px;border-radius:999px;background:rgba(249,115,22,0.92)!important;animation:pop 2.2s ease-in-out infinite; }
      .hcta2 { height:32px;width:88px; border-radius:999px;background:rgba(255,255,255,0.14)!important; }

      /* ── CATEGORIES ── */
      #sc {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
      }
      .cc {
        background: var(--card);
        border: 1px solid var(--s1);
        border-radius: 12px;
        padding: 12px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      /* ── OFFER BANNERS ── */
      #so {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .oc {
        background: var(--card);
        border: 1px solid var(--s1);
        border-radius: 12px;
        padding: 14px;
        display: grid;
        grid-template-columns: 1fr 72px;
        gap: 10px;
        align-items: center;
        min-width: 0;
      }

      /* ── PRODUCTS ── */
      #sp {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .pc {
        background: var(--card);
        border: 1px solid var(--s1);
        border-radius: 12px;
        overflow: hidden;
        min-width: 0;
      }
      .pi {
        height: 155px;
        background: var(--s1);
        position: relative;
        overflow: hidden;
      }
      .pi::after {
        content:"";position:absolute;inset:0;
        background:linear-gradient(90deg,transparent,var(--sh),transparent);
        transform:translateX(-100%);
        animation:sh 1.55s linear infinite;
      }
      .pb { padding:11px; display:flex; flex-direction:column; gap:5px; }
      .stars { display:flex; gap:3px; align-items:center; }
      .star { width:10px;height:10px;border-radius:50%; }

      /* ── DEAL OF THE DAY ── */
      #sd {
        background: var(--card);
        border: 1px solid var(--s1);
        border-left: 4px solid #f97316;
        border-radius: 12px;
        overflow: hidden;
      }
      #sd-head {
        padding: 12px 16px;
        border-bottom: 1px solid var(--s1);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .ck { display:flex; gap:5px; align-items:center; }
      .cu {
        background:#111827;
        border-radius:7px;
        width:42px;height:40px;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        gap:3px;
      }
      #sd-body {
        padding: 12px 16px;
        display: flex;
        gap: 10px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      #sd-body::-webkit-scrollbar { display:none; }
      .dc {
        flex-shrink: 0;
        width: 160px;
        background: var(--bg);
        border: 1px solid var(--s1);
        border-radius: 10px;
        overflow: hidden;
      }
      .di {
        height: 120px;
        background: var(--s1);
        position: relative;
        overflow: hidden;
      }
      .di::after {
        content:"";position:absolute;inset:0;
        background:linear-gradient(90deg,transparent,var(--sh),transparent);
        transform:translateX(-100%);
        animation:sh 1.55s linear infinite;
      }

      /* ── BRANDS ── */
      #sbr {
        background: var(--card);
        border: 1px solid var(--s1);
        border-radius: 12px;
        padding: 16px;
      }
      #sbr-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 12px;
        justify-content: center;
      }

      /* ── FOOTER ── */
      #sf {
        background: var(--card);
        border: 1px solid var(--s1);
        border-radius: 14px;
        padding: 20px 16px;
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
      }
      .fc { display:flex; flex-direction:column; gap:7px; min-width:0; }

      /* ════════════════════════════════
         RESPONSIVE BREAKPOINTS
         ════════════════════════════════ */

      /* ── tablet 1024px ── */
      @media (max-width:1024px) {
        #sc { grid-template-columns: repeat(3,1fr); }
        #sp { grid-template-columns: repeat(3,1fr); }
        #so { grid-template-columns: repeat(2,1fr); }
        #sf { grid-template-columns: repeat(3,1fr); }
      }

      /* ── small tablet / large phone 768px ── */
      @media (max-width:768px) {
        #sh  { grid-template-columns: 96px 1fr auto; padding: 8px 12px; gap:8px; }
        #shr { grid-template-columns: 1fr 120px; min-height:170px; padding:18px 16px; }
        #shr-img { width:110px;height:110px; }
        #sc  { grid-template-columns: repeat(3,1fr); }
        #sp  { grid-template-columns: repeat(2,1fr); }
        #so  { grid-template-columns: repeat(2,1fr); }
        #st  { grid-template-columns: repeat(2,1fr); }
        #sf  { grid-template-columns: repeat(2,1fr); }
        .dc  { width:145px; }
      }

      /* ── phone 480px ── */
      @media (max-width:480px) {
        /* header: logo | search | icon only */
        #sh  { grid-template-columns: 80px 1fr 36px; padding:8px 10px; gap:7px; }
        /* hide the cart button on very small, show only icon */
        #sh-cart { display:none; }
        /* nav: hide overflow naturally */
        #sn  { padding:6px 10px; gap:6px; }
        #sw  { padding:10px 10px 24px; gap:14px; }

        /* hero: single column */
        #shr { grid-template-columns:1fr; min-height:140px; padding:16px 14px; gap:12px; }
        #shr-img { display:none; }

        /* trust: 2 col */
        #st  { grid-template-columns: repeat(2,1fr); gap:7px; }
        .tc  { padding:9px 10px; gap:7px; }

        /* categories: 3 col (matches your real app) */
        #sc  { grid-template-columns: repeat(3,1fr); gap:7px; }
        .cc  { padding:10px 4px; gap:6px; }

        /* offers: single col */
        #so  { grid-template-columns: 1fr; }

        /* products: 2 col (matches your real app mobile grid) */
        #sp  { grid-template-columns: repeat(2,1fr); gap:8px; }
        .pi  { height:130px; }

        /* deal countdown wraps */
        #sd-head { flex-direction:column; align-items:flex-start; gap:10px; padding:12px 12px; }
        #sd-body { padding:10px 12px; gap:8px; }
        .dc  { width:140px; }
        .di  { height:108px; }

        /* footer: 2 col */
        #sf  { grid-template-columns: repeat(2,1fr); gap:12px; padding:16px 12px; }
      }

      /* ── very small phone 360px ── */
      @media (max-width:360px) {
        #sh  { grid-template-columns: 70px 1fr 36px; padding:7px 8px; }
        #sc  { grid-template-columns: repeat(3,1fr); gap:5px; }
        #sp  { grid-template-columns: repeat(2,1fr); gap:6px; }
        .pi  { height:115px; }
        #sw  { padding:8px 8px 20px; gap:12px; }
        .dc  { width:130px; }
      }
    </style>

    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
  </head>
